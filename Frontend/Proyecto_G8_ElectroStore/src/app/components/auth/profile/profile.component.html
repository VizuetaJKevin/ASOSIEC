<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card bg-dark shadow">
        <div class="card-header bg-light text-center bold">
          <h2>Perfil de Usuario</h2>
        </div>
        <div class="card-body">
          <div class="text-center text-white">
            <div class="avatar-container mb-4">
              <img src="/assets/Images/auth/avatar.png" alt="Avatar" class="avatar-img img-fluid">
            </div>
          </div>

          <h1 class="tittle text-white text text-center">Editar datos de Usuario</h1>
          <form [formGroup]="formulario" (ngSubmit)="Actualizar()">
            <div class="mb-3  text-white">
              <label for="nombre" class="form-label">Nombre:</label>
              <input formControlName="nombre" type="text" class="form-control" placeholder="Nombre">
            </div>
            <div class="mb-3  text-white">
              <label for="apellido" class="form-label">Apellido:</label>
              <input formControlName="apellido" type="text" class="form-control" placeholder="Apellido">
            </div>
            <div class="mb-3  text-white">
              <label for="email" class="form-label">Correo:</label>
              <input formControlName="email" type="text" class="form-control"  placeholder="Correo">
            </div>
            <div class="mb-3  text-white">
              <label for="password" class="form-label">Contraseña:</label>
              <input formControlName="password" type="password" class="form-control"  placeholder="Contraseña">
            </div>
            <div class="text-center">
              <button type="submit" class="btn btn-primary">Actualizar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
