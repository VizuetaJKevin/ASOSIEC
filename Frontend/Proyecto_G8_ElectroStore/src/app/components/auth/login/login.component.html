<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card bg-dark text-white">
        <div class="card-header">
          <h2 class="text-center">Login</h2>
        </div>
        <div class="card-body">
          <form [formGroup]="FormularioLogin" [autocomplete]="false">
            <div class="mb-3">
              <label for="username" class="form-label">Username:</label>
              <input formControlName="email" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
              <div *ngIf="valido('email')"
                   class="text-danger">
                   Este campo es requerido
              </div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password:</label>
              <input formControlName="password" type="password" class="form-control" id="exampleInputPassword1">
              <div *ngIf="valido('password')"
                   class="text-danger">
                   La contraseña es requerida
              </div>
            </div>
            <div class="text-center">
              <a class="text-decoration-none">¿No tiene cuenta? </a> <br>
              <button mat-button (click)="registrar()">Registrarse</button>
            </div>
              <br>
            <div class="text-center">
            <a class="text-decoration-none">¿Olvidó sus credenciales? </a> <br>
            <button mat-button  (click)="recuperar()">Recuperar cuenta</button>
            </div>
            <br>
            <div class="text-center">
              <button type="submit" (click)="login()" class="btn btn-primary">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
