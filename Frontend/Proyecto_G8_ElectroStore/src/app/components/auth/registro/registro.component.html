<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card bg-dark text-white">
        <div class="card-header">
          <h2 class="text-center">Registro de usuario</h2>
        </div>
        <div class="card-body">
          <form [formGroup]="FormularioRegistro">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombres:</label>
              <input formControlName="nombre" type="text" class="form-control">
              <div *ngIf="valido('nombre')" class="text-danger">
                Los nombres son requeridos
              </div>
            </div>
            <div class="mb-3">
              <label for="apellido" class="form-label">Apellidos:</label>
              <input formControlName="apellido" type="text" class="form-control">
              <div *ngIf="valido('apellido')" class="text-danger">
                Los apellidos son requeridos
              </div>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email:</label>
              <input formControlName="email" type="email" class="form-control">
              <div *ngIf="valido('email')" class="text-danger">
                El email es requerido
              </div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña:</label>
              <input formControlName="password" type="password" class="form-control">
              <div *ngIf="valido('password')" class="text-danger">
                La contraseña es requerida
              </div>
            </div>

            <div class="text-center">
              <button type="submit" (click)="registro()" class="btn btn-primary">Aceptar</button> &nbsp;
              <button type="button" (click)="cancelarRegistro()" class="btn btn-primary">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
