<mat-toolbar>
  <mat-toolbar-row>
    <button mat-button routerLink="/" class="grow-on-hover">
      <span class="logo-container">
        <img src="/assets/Images/home/logo.png" alt="logo" class="logo">
        <span class="store-name">Electro Store</span>
      </span>
    </button>

    <span class="spacer"></span>

    <button class="user grow-on-hover shadow" *ngIf="user.rolid==2" mat-button [matMenuTriggerFor]="cliente">
      <span class="menu-button">
        <span class="user-name">{{ user.nombre }}</span>
      </span>
    </button>

    <mat-menu #cliente="matMenu">
      <button mat-menu-item routerLink="/profile">Mi perfil</button>
      <button mat-menu-item routerLink="/inventory">Mis productos</button>
      <button mat-menu-item routerLink="/home"  (click)="Logout()">Cerrar sesión</button>
    </mat-menu>

    <div class="user-options-container" *ngIf="user.rolid==1">
      <span class="developer-options-text">Developer Options</span>
      <button class="user grow-on-hover shadow" mat-icon-button [matMenuTriggerFor]="admin">
        <mat-icon aria-hidden="false" aria-label="menu">menu</mat-icon>
      </button>
      <mat-menu #admin="matMenu">
        <button mat-menu-item routerLink="/adm-usuarios">Administrar usuarios</button>
        <button mat-menu-item routerLink="/adm-productos">Administrar productos</button>
        <button mat-menu-item routerLink="/adm-estados">Administrar estados</button>
        <button mat-menu-item routerLink="/adm-roles">Administrar roles</button>
        <button mat-menu-item (click)="Logout()">Cerrar sesión</button>
      </mat-menu>
    </div>

    <button mat-button routerLink="/login" class="custom-mat-button grow-on-hover" *ngIf="user.id==0" routerLinkActive="active">Login</button>
    <button mat-button routerLink="/productos" class="custom-mat-button grow-on-hover" *ngIf="user.rolid==0 || user.rolid === 2" routerLinkActive="active">Tienda</button>
    <button mat-button routerLink="/about" class="custom-mat-button grow-on-hover" *ngIf="user.rolid==0 || user.rolid === 2" routerLinkActive="active">Nosotros</button>
    <button mat-button routerLink="/contact" class="custom-mat-button grow-on-hover" *ngIf="user.rolid === 0 || user.rolid === 2" routerLinkActive="active">Contáctenos</button>

    <button mat-button routerLink="/carrito" class="cart-button custom-mat-button grow-on-hover" *ngIf="user.rolid === 0 || user.rolid === 2" routerLinkActive="active">
      <mat-icon>shopping_cart</mat-icon>
      <span class="cart-badge">{{ itemsTotal }}</span>
    </button>
  </mat-toolbar-row>
</mat-toolbar>
