<section class="destacados">
  <h1 class="fw-bolder text-center">¡PRODUCTOS EN STOCK!</h1>
  <div class="input-group mb-3 mx-auto shadow">
    <input type="text" class="form-control" placeholder="Filtrar por marca" [formControl]="filtroNombre">
    <div class="input-group-append">
      <button class="btn btn-dark" type="button" (click)="filtroNombre.setValue('')">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-4 g-4 p-4">
    <div class="col" *ngFor="let item of listaproductos | filterByName: filtroNombre.value || ''">
      <div class="card h-100 text-center d-flex flex-column shadow">
        <img src="assets/Images/productos/{{item.url_Img}}" class="card-img-top" alt="...">
        <div class="card-body flex-grow-1">
          <h1 class="card-title">{{item.nombre_producto}}</h1>
          <p class="card-text">{{item.descripcion}}</p>
          <br>
          <ul class="list-group list-group-flush fw-bold mt-auto">
            <li class="list-group-item">Precio Web:</li>
            <li class="list-group-item">{{ item.precio_ahora | currency:'USD':'symbol':'1.2-2' }}</li>
          </ul>
          <button class="btn btn-primary mt-3" (click)="agregarAlCarrito(item.id)" [routerLink]="['/carrito']">Comprar</button>
        </div>
      </div>
    </div>
  </div>
</section>
